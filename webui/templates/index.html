<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tech Lookout</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="accordion">
        <section class="panel">
          <button class="tab-header" data-target="top-of-mind-body">
            <span>🔥 Top of Mind</span>
            <span class="chevron">▸</span>
          </button>
          <div class="tab-body" id="top-of-mind-body">
            <div id="top-of-mind" class="panel-body muted">Loading…</div>
          </div>
        </section>

        <section class="panel">
          <button class="tab-header" data-target="session-body">
            <span>Last Pipeline Run</span>
            <span class="chevron">▸</span>
          </button>
          <div class="tab-body" id="session-body">
            <div id="session-info" class="panel-body muted">Loading…</div>
          </div>
        </section>

        <section class="panel">
          <button class="tab-header" data-target="reports-body">
            <span>Reports</span>
            <span class="chevron">▸</span>
          </button>
          <div class="tab-body" id="reports-body">
            <div id="reports-list" class="panel-body muted">Loading…</div>
          </div>
        </section>

        <section class="panel">
          <button class="tab-header" data-target="chat-history-body">
            <span>💬 Chat History</span>
            <span class="chevron">▸</span>
          </button>
          <div class="tab-body" id="chat-history-body">
            <div id="chat-history" class="panel-body muted">Loading…</div>
          </div>
        </section>
      </div>

      <button id="end-session-btn" class="secondary-btn">End session &amp; save</button>
    </aside>

    <div class="resizer" id="sidebar-resizer"></div>

    <main class="chat">
      <div class="view-tabs">
        <button class="view-tab active" data-view="chat-view">Chat</button>
        <button class="view-tab" data-view="report-view">Report</button>
      </div>

      <div id="chat-view" class="view active">
        <div id="messages" class="messages">
          <div class="msg agent">
            <div class="bubble">Hi — ask me about recent tech news. I'll search the local knowledge base first.</div>
          </div>
        </div>

        <form id="chat-form" class="composer">
          <input id="chat-input" type="text" autocomplete="off" placeholder="Ask about tech news…" />
          <button type="submit">Send</button>
        </form>
      </div>

      <div id="report-view" class="view">
        <div id="report-placeholder" class="report-placeholder">Select a report from the sidebar to view it here.</div>
        <iframe id="report-frame" class="report-frame"></iframe>
      </div>
    </main>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
